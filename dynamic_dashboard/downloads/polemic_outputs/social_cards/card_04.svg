<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img">
<rect width="100%" height="100%" fill="#151515"/>
<rect x="54" y="54" width="972" height="1242" rx="0" fill="none" stroke="#ff6b35" stroke-width="6"/>
<text x="82" y="120" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#ff6b35">VivaTech evidence card 04</text>
<text x="82" y="170" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#f8f4ec" opacity="0.78">controversy 5/5 · defensibility 4/5</text>
<text x="82" y="272" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="900" fill="#7cc6fe">4.0x gap</text>
<text x="82" y="390" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#f8f4ec">Tech for Change is</text>
<text x="82" y="472" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#f8f4ec">under-amplified.</text>
<text x="82" y="598" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#ff6b35">The moral label shows up on the</text>
<text x="82" y="644" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#ff6b35">floor, but weakly converts into</text>
<text x="82" y="690" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#ff6b35">matched speakers.</text>
<rect x="82" y="762" width="916" height="196" fill="#f8f4ec" opacity="0.07"/>
<text x="112" y="798" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#f8f4ec">Tech for Change has 424 exhibitors but 13</text>
<text x="112" y="834" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#f8f4ec">matched speakers: 3.1 per 100 companies.</text>
<text x="112" y="870" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#f8f4ec">Unlabeled exhibitors have 12.5 per 100, about</text>
<text x="112" y="906" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#f8f4ec">4.0x higher.</text>
<text x="82" y="1118" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#f8f4ec">Caveat: The label may identify a curated floor</text>
<text x="82" y="1150" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#f8f4ec">program rather than a stage program; still, the</text>
<text x="82" y="1182" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#f8f4ec">attention gap is real in the listing data.</text>
<text x="82" y="1250" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#ff6b35">Source: VivaTech company and speaker listing scrape, 2026-06-17</text>
</svg>