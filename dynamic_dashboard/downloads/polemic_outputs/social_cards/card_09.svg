<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img">
<rect width="100%" height="100%" fill="#fbfaf7"/>
<rect x="54" y="54" width="972" height="1242" rx="0" fill="none" stroke="#c94343" stroke-width="6"/>
<text x="82" y="120" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#c94343">VivaTech evidence card 09</text>
<text x="82" y="170" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#161411" opacity="0.78">controversy 4/5 · defensibility 4/5</text>
<text x="82" y="272" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="900" fill="#2454a6">1.3</text>
<text x="82" y="390" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">Korea has booth mass</text>
<text x="82" y="472" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">but almost no matched</text>
<text x="82" y="554" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">microphone.</text>
<text x="82" y="680" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#c94343">After fixing the split country</text>
<text x="82" y="726" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#c94343">label, Korea remains almost silent</text>
<text x="82" y="772" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#c94343">in matched speaker density.</text>
<rect x="82" y="844" width="916" height="160" fill="#161411" opacity="0.07"/>
<text x="112" y="880" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#161411">South Korea plus `korearepublicof` totals 153</text>
<text x="112" y="916" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#161411">exhibitor records but only 2 matched speakers,</text>
<text x="112" y="952" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#161411">or 1.3 per 100 companies.</text>
<text x="82" y="1118" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#161411">Caveat: This claim depends on normalizing the raw</text>
<text x="82" y="1150" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#161411">country split and may undercount unmatched speaker</text>
<text x="82" y="1182" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#161411">organizations.</text>
<text x="82" y="1250" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#c94343">Source: VivaTech company and speaker listing scrape, 2026-06-17</text>
</svg>