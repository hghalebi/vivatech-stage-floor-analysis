<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img">
<rect width="100%" height="100%" fill="#f7f2e8"/>
<rect x="54" y="54" width="972" height="1242" rx="0" fill="none" stroke="#18805b" stroke-width="6"/>
<text x="82" y="120" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#18805b">VivaTech evidence card 07</text>
<text x="82" y="170" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#161411" opacity="0.78">controversy 4/5 · defensibility 5/5</text>
<text x="82" y="272" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="900" fill="#c94343">48.0%</text>
<text x="82" y="390" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">AI is not the story.</text>
<text x="82" y="472" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">AI is the wallpaper.</text>
<text x="82" y="598" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#18805b">When nearly half the event is</text>
<text x="82" y="644" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#18805b">tagged AI, the sharper story is</text>
<text x="82" y="690" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#18805b">who gets amplified inside AI.</text>
<rect x="82" y="762" width="916" height="150" fill="#161411" opacity="0.07"/>
<text x="112" y="798" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#161411">AI/Robotics appears on 1513 exhibitors (48.0%)</text>
<text x="112" y="834" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#161411">and 528 speakers (46.6%).</text>
<text x="82" y="1118" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#161411">Caveat: The AI tag measures listing taxonomy, not</text>
<text x="82" y="1150" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#161411">product quality or real AI depth.</text>
<text x="82" y="1250" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#18805b">Source: VivaTech company and speaker listing scrape, 2026-06-17</text>
</svg>