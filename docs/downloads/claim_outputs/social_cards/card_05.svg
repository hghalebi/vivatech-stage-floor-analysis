<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img">
<rect width="100%" height="100%" fill="#fbfaf7"/>
<rect x="54" y="54" width="972" height="1242" rx="0" fill="none" stroke="#c94343" stroke-width="6"/>
<text x="82" y="120" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#c94343">VivaTech evidence card 05</text>
<text x="82" y="170" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#161411" opacity="0.78">controversy 4/5 · defensibility 5/5</text>
<text x="82" y="272" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="900" fill="#2454a6">6.3%</text>
<text x="82" y="390" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">The floor is</text>
<text x="82" y="472" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">concentrated in one</text>
<text x="82" y="554" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">hall, but attention</text>
<text x="82" y="636" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">is still scarce.</text>
<text x="82" y="762" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#c94343">Booth geography does not explain</text>
<text x="82" y="808" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#c94343">the microphone gap.</text>
<rect x="82" y="880" width="916" height="160" fill="#161411" opacity="0.07"/>
<text x="112" y="916" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#161411">Pavillon 7 contains 2517 exhibitors (79.8% of</text>
<text x="112" y="952" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#161411">all companies), yet only 159 of those</text>
<text x="112" y="988" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#161411">companies have a matched speaker (6.3%).</text>
<text x="82" y="1118" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#161411">Caveat: Hall values are listing fields; 636</text>
<text x="82" y="1150" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#161411">companies have no hall value in the payload.</text>
<text x="82" y="1250" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#c94343">Source: VivaTech company and speaker listing scrape, 2026-06-17</text>
</svg>