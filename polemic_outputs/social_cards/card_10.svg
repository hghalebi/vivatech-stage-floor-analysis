<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img">
<rect width="100%" height="100%" fill="#11130f"/>
<rect x="54" y="54" width="972" height="1242" rx="0" fill="none" stroke="#f2c94c" stroke-width="6"/>
<text x="82" y="120" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#f2c94c">VivaTech evidence card 10</text>
<text x="82" y="170" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#fbfaf7" opacity="0.78">controversy 4/5 · defensibility 4/5</text>
<text x="82" y="272" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="900" fill="#69d2a7">8.0x</text>
<text x="82" y="390" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#fbfaf7">Funding maturity buys</text>
<text x="82" y="472" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#fbfaf7">microphone odds.</text>
<text x="82" y="598" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#f2c94c">The event celebrates early</text>
<text x="82" y="644" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#f2c94c">startups, but later-stage</text>
<text x="82" y="690" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#f2c94c">companies get much better matched</text>
<text x="82" y="736" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#f2c94c">speaker density.</text>
<rect x="82" y="808" width="916" height="160" fill="#fbfaf7" opacity="0.07"/>
<text x="112" y="844" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#fbfaf7">Series C exhibitors show 16.7 matched speakers</text>
<text x="112" y="880" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#fbfaf7">per 100 companies, versus 2.1 for bootstrapped</text>
<text x="112" y="916" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#fbfaf7">companies.</text>
<text x="82" y="1118" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#fbfaf7">Caveat: Series C has only 24 companies, so this is a</text>
<text x="82" y="1150" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#fbfaf7">directional signal rather than a causal proof.</text>
<text x="82" y="1250" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#f2c94c">Source: VivaTech company and speaker listing scrape, 2026-06-17</text>
</svg>