<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img">
<rect width="100%" height="100%" fill="#f7f2e8"/>
<rect x="54" y="54" width="972" height="1242" rx="0" fill="none" stroke="#18805b" stroke-width="6"/>
<text x="82" y="120" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#18805b">VivaTech evidence card 03</text>
<text x="82" y="170" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#161411" opacity="0.78">controversy 4/5 · defensibility 5/5</text>
<text x="82" y="272" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="900" fill="#c94343">57.4%</text>
<text x="82" y="390" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">Top speakers are</text>
<text x="82" y="472" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">twice as likely to be</text>
<text x="82" y="554" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#161411">tagless.</text>
<text x="82" y="680" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#18805b">The highest-status speaker layer</text>
<text x="82" y="726" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#18805b">is less classified by topic than</text>
<text x="82" y="772" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" fill="#18805b">ordinary speakers.</text>
<rect x="82" y="844" width="916" height="150" fill="#161411" opacity="0.07"/>
<text x="112" y="880" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#161411">57.4% of top speakers have no speaker tags,</text>
<text x="112" y="916" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="650" fill="#161411">compared with 27.8% of non-top speakers.</text>
<text x="82" y="1118" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#161411">Caveat: A missing tag is a listing-data signal, not</text>
<text x="82" y="1150" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#161411">proof that the speaker lacks a topic.</text>
<text x="82" y="1250" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#18805b">Source: VivaTech company and speaker listing scrape, 2026-06-17</text>
</svg>